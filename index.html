<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi 10A4</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --env-color: #f3e5ab; 
            --env-dark: #e5d38f;
            --paper-color: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            transition: background 0.8s ease;
            overflow: hidden;
            background-color: #202020;
            color: white;
        }

        #audio-unlock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-family: 'VT323', monospace; font-size: 30px;
        }

        #game-container {
            position: relative; width: 100%; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .screen { 
            display: none; width: 100%; height: 100vh;
            position: absolute; left: 0; top: 0;
            animation: fadeIn 0.5s; 
            flex-direction: column; justify-content: center; align-items: center;
        }

        .active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .npc-character { height: 200px; image-rendering: pixelated; margin-bottom: 20px; }

        .dialogue-box {
            background: #000; border: 4px solid #fff; padding: 20px;
            width: 85%; max-width: 500px; min-height: 100px;
            font-family: 'VT323', monospace; color: #fff; font-size: 26px;
            position: relative; box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
        }

        .choices { margin-top: 20px; display: flex; gap: 15px; justify-content: center; }

        .pixel-btn {
            background: #000; color: #fff; border: 2px solid #fff;
            padding: 10px 20px; font-family: 'VT323', monospace;
            font-size: 22px; cursor: pointer; text-transform: uppercase;
            /* Thêm transition để nút lướt đi mượt hơn */
            transition: left 0.1s ease-out, top 0.1s ease-out;
        }
        .pixel-btn:hover { background: #fff; color: #000; }

        .input-box {
            background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 15px;
            text-align: center; color: #333;
            transform: translateY(-150px);
        }
        input { padding: 12px; font-size: 18px; border: 2px solid #ddd; border-radius: 8px; width: 250px; display: block; margin: 20px auto; text-align: center; }
        .confirm-btn { padding: 12px 35px; font-size: 18px; background: #e74c3c; color: white; border: none; border-radius: 8px; cursor: pointer; }

        .envelope-wrapper { position: relative; width: 300px; height: 200px; background: var(--env-dark); cursor: pointer; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .paper { position: absolute; bottom: 5px; left: 10px; width: 280px; height: 180px; background: var(--paper-color); z-index: 1; transition: transform 0.8s ease-in-out 0.5s; }
        .flap { position: absolute; top: 0; left: 0; width: 0; height: 0; border-left: 150px solid transparent; border-right: 150px solid transparent; border-top: 100px solid var(--env-color); z-index: 3; transform-origin: top; transition: transform 0.5s ease-in-out; }
        .pocket { position: absolute; bottom: 0; left: 0; width: 0; height: 0; border-left: 150px solid var(--env-color); border-right: 150px solid var(--env-color); border-bottom: 100px solid var(--env-dark); border-top: 100px solid transparent; z-index: 2; }
        .envelope-wrapper.open .flap { transform: rotateX(180deg); z-index: 0; }
        .envelope-wrapper.open .paper { transform: translateY(-100px); }

        .letter-paper { background: #fff; padding: 40px; width: 85%; max-width: 500px; margin: 0 auto; border-radius: 5px; color: #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-top: 8px solid var(--env-dark); overflow-y: auto; max-height: 80vh; }
        .message { font-size: 18px; line-height: 1.6; white-space: pre-line; text-align: left; }
    </style>
</head>
<body>

    <div id="audio-unlock">NHẤN VÀO ĐÂY ĐỂ BẮT ĐẦU...</div>

    <div id="game-container">
        <div id="screen-npc" class="screen">
            <img src="character.png" class="npc-character" alt="Character">
            <div class="dialogue-box">
                <div id="npc-text"></div>
                <div class="choices" id="npc-choices" style="visibility: hidden;">
                    <button class="pixel-btn" onclick="goToInput()">Cảm động chứ</button>
                    <button class="pixel-btn" id="btn-runaway">Cũng bình thường thôi</button>
                </div>
            </div>
        </div>

        <div id="screen1" class="screen">
            <div class="input-box">
                <h2>Nhập cả họ và tên để nhận lời chúc nhé</h2>
                <input type="text" id="nameInput" placeholder="Ví dụ: Nguyễn Văn A">
                <button class="confirm-btn" onclick="checkName()">Xác nhận</button>
            </div>
        </div>

        <div id="screen2" class="screen">
            <div class="envelope-wrapper" id="envelope" onclick="openAndShow()">
                <div class="flap"></div>
                <div class="paper"></div>
                <div class="pocket"></div>
            </div>
            <p style="color: white; margin-top: 50px; font-size: 20px; font-weight: bold; text-align: center;">Bấm vào phong bì để mở thư nhé!</p>
        </div>

        <div id="screen3" class="screen">
            <div class="letter-paper">
                <h2>Gửi: <span id="nameDisplay"></span></h2>
                <p class="message" id="msgDisplay"></p>
                <button class="confirm-btn" style="margin-top: 20px; background: #333;" onclick="location.reload()">Quay lại</button>
            </div>
        </div>
    </div>

    <audio id="blip" src="blip.mp3"></audio>
    <audio id="music" src="music.mp3" loop></audio>

        let current = { name: "", msg: "" };
        const blip = document.getElementById('blip');
        const music = document.getElementById('music');
        const introMsg = "Hi, hôm nay là 27/03/2026 là buổi cuối cùng trong thời gian thực tập rồi của cô rồi, nhanh nhỉ? Cô có vài lời chúc muốn gửi tới từng bạn trong lớp và chắc chắn trong đó không thể thiếu em, CẢM ĐỘNG KHÔNG?";

        // --- MỞ KHÓA ÂM THANH ---
        document.getElementById('audio-unlock').addEventListener('click', function() {
            this.style.display = 'none';
            switchScreen('screen-npc');
            typeWriter(introMsg, 0, () => {
                document.getElementById('npc-choices').style.visibility = 'visible';
                setupRunawayButton();
            });
        });

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function typeWriter(text, i, cb) {
            const npcText = document.getElementById('npc-text');
            if (i === 0) blip.play().catch(()=>{});

            if (i < text.length) {
                npcText.innerHTML += text.charAt(i);
                setTimeout(() => typeWriter(text, i + 1, cb), 50);
            } else {
                blip.pause();
                blip.currentTime = 0;
                if (cb) cb();
            }
        }

        // --- HÀM NÚT BỎ QUA CHẠY TRỐN (PC & MOBILE) ---
        function setupRunawayButton() {
            const runBtn = document.getElementById('btn-runaway');
            
            const runawayAction = (e) => {
                if (e) e.preventDefault(); // Cực kỳ quan trọng để chặn click trên mobile
                
                const maxX = window.innerWidth - runBtn.offsetWidth - 20;
                const maxY = window.innerHeight - runBtn.offsetHeight - 20;
                
                const newX = Math.max(10, Math.random() * maxX);
                const newY = Math.max(10, Math.random() * maxY);
                
                runBtn.style.position = 'fixed';
                runBtn.style.left = newX + 'px';
                runBtn.style.top = newY + 'px';
                runBtn.style.zIndex = '9999';
            };

            // Di chuột (PC)
            runBtn.addEventListener('mouseover', runawayAction);
            // Chạm vào (Điện thoại)
            runBtn.addEventListener('touchstart', runawayAction);
            // Click (Nếu lỡ bấm trúng)
            runBtn.addEventListener('click', (e) => {
                e.preventDefault();
                runawayAction();
                alert("Không bỏ qua được đâu em ơi! :v");
            });
        }

        function goToInput() {
            document.body.style.background = "url('bg1.jpg') no-repeat center center/cover";
            switchScreen('screen1');
        }

        function checkName() {
            const val = document.getElementById('nameInput').value.trim();
            const found = Object.keys(studentData).find(n => n.toLowerCase() === val.toLowerCase());
            if (found) {
                current.name = found; 
                current.msg = studentData[found];
                document.body.style.background = "#1a1a1a";
                switchScreen('screen2');
            } else { 
                alert("Viết sai tên à? Thử lại đi em :v"); 
            }
        }

        function openAndShow() {
            document.getElementById('envelope').classList.add('open');
            setTimeout(() => {
                document.body.style.background = "url('bg2.jpg') no-repeat center center/cover";
                switchScreen('screen3');
                document.getElementById('nameDisplay').innerText = current.name;
                document.getElementById('msgDisplay').innerText = current.msg;
                music.play().catch(()=>{});
                
                const end = Date.now() + 2000;
                (function frame() {
                    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            }, 1500);
        }
    </script>
